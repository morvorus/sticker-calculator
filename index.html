<!-- ==================== LERTSIL PRINTING — เครื่องคิดราคาสติกเกอร์ ==================== -->
<div id="mpcRoot" style="display:block;width:100%;max-width:580px;margin:0 auto;padding:18px;background:#e7f0e9;border-radius:20px;font-family:Sarabun,Arial,sans-serif;">
  <div style="background:#fbfaf6;border-radius:16px;box-shadow:0 6px 22px rgba(31,93,74,0.13);overflow:visible;">

    <div style="background:linear-gradient(135deg,#1f5d4a 0%,#2f7a5f 100%);padding:22px 24px 26px;border-radius:16px 16px 0 0;">
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.8);margin-bottom:8px;">🖨️ ระบบคำนวณราคาสติกเกอร์</div>
      <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:5px;">คำนวณราคาสติกเกอร์</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.75);line-height:1.55;">เลือกชนิดวัสดุ ใส่ขนาดและจำนวน ระบบคำนวณราคาตามขั้นบันไดให้ทันที</div>
    </div>

    <div style="position:relative;border-top:2px dashed rgba(31,93,74,0.22);padding:26px 22px 22px;">
      <div style="position:absolute;top:-11px;left:-11px;width:22px;height:22px;border-radius:50%;background:#e7f0e9;"></div>
      <div style="position:absolute;top:-11px;right:-11px;width:22px;height:22px;border-radius:50%;background:#e7f0e9;"></div>

      <div id="mpcItems"></div>

      <button type="button" onclick="mpcAdd()" style="display:block;width:100%;padding:11px 16px;background:#fff;color:#1f5d4a;font-size:14px;font-weight:600;border:1.5px dashed #2f7a5f;border-radius:9px;cursor:pointer;margin-bottom:22px;font-family:Sarabun,Arial,sans-serif;box-sizing:border-box;">
        + เพิ่มสติกเกอร์อีกรายการ
      </button>

      <div style="border-top:1px solid #dde7de;padding-top:16px;">
        <div style="font-size:14px;font-weight:700;color:#233129;margin-bottom:10px;">สรุปใบเสนอราคา</div>
        <div id="mpcSumList" style="margin-bottom:10px;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:#1f5d4a;border-radius:10px;">
          <span style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.88);">ราคารวมทั้งหมด</span>
          <span id="mpcTotal" style="font-size:19px;font-weight:700;color:#fff;">0.00 บาท</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var mpcUID=0, mpcIDS=[];
var mpcMW=28.6, mpcML=39.5, mpcBL=0.2;
var mpcT={
  'กระดาษขาวเงา':[[3,350],[10,300],[19,270],[1e9,209]],
  'PP ขาวเงา':   [[3,450],[10,390],[19,360],[1e9,249]],
  'PP ใส':       [[3,460],[10,400],[19,370],[1e9,269]],
  'PP ด้าน':     [[3,460],[10,400],[19,370],[1e9,269]]
};
function mpcRate(mat,a){var r=mpcT[mat]||mpcT['กระดาษขาวเงา'];for(var i=0;i<r.length;i++){if(a<=r[i][0])return r[i][1];}return r[r.length-1][1];}
function mpcFmt(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function mpcClampW(id){var el=document.getElementById('mpcW'+id);if(el&&parseFloat(el.value)>mpcMW)el.value=mpcMW;mpcCalc();}
function mpcClampL(id){var el=document.getElementById('mpcL'+id);if(el&&parseFloat(el.value)>mpcML)el.value=mpcML;mpcCalc();}
function mpcDel(id){var el=document.getElementById('mpcRow'+id);if(el)el.parentNode.removeChild(el);mpcIDS=mpcIDS.filter(function(x){return x!==id;});mpcCalc();}

function mpcAdd(){
  var items=document.getElementById('mpcItems');
  if(!items)return;
  var id=++mpcUID;
  mpcIDS.push(id);
  var IS='display:block;width:100%;padding:9px 10px;border:1px solid #dde7de;border-radius:7px;font-size:14px;color:#233129;background:#fff;box-sizing:border-box;font-family:Sarabun,Arial,sans-serif;';
  var SS='flex:1;padding:9px 11px;border:1px solid #dde7de;border-radius:8px;font-size:14px;font-weight:600;color:#233129;background:#fff;font-family:Sarabun,Arial,sans-serif;';
  var d=document.createElement('div');
  d.id='mpcRow'+id;
  d.style.cssText='display:block;border:1px solid #dde7de;border-radius:10px;padding:14px;background:#f2f6f2;margin-bottom:12px;';
  d.innerHTML=
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">'
    +'<select id="mpcM'+id+'" oninput="mpcCalc()" style="'+SS+'">'
    +'<option value="กระดาษขาวเงา">สติกเกอร์ กระดาษขาวเงา</option>'
    +'<option value="PP ขาวเงา">สติกเกอร์ PP ขาวเงา</option>'
    +'<option value="PP ใส">สติกเกอร์ PP ใส</option>'
    +'<option value="PP ด้าน">สติกเกอร์ PP ด้าน</option>'
    +'</select>'
    +'<button type="button" onclick="mpcDel('+id+')" style="width:32px;height:32px;min-width:32px;border:1px solid #e3cdc6;background:#f8efec;color:#a14438;border-radius:8px;font-size:17px;cursor:pointer;padding:0;font-family:Sarabun,Arial,sans-serif;">✕</button>'
    +'</div>'
    +'<div style="margin-bottom:10px;">'
    +'<div style="font-size:12px;font-weight:600;color:#6c7a71;margin-bottom:5px;">กว้าง (ซม.) <span style="font-weight:400;font-size:10.5px;color:#9aa69d;">สูงสุด 28.6</span></div>'
    +'<input type="number" id="mpcW'+id+'" min="0" max="28.6" step="0.01" placeholder="0.00" oninput="mpcCalc()" onblur="mpcClampW('+id+')" style="'+IS+'">'
    +'</div>'
    +'<div style="margin-bottom:10px;">'
    +'<div style="font-size:12px;font-weight:600;color:#6c7a71;margin-bottom:5px;">ยาว (ซม.) <span style="font-weight:400;font-size:10.5px;color:#9aa69d;">สูงสุด 39.5</span></div>'
    +'<input type="number" id="mpcL'+id+'" min="0" max="39.5" step="0.01" placeholder="0.00" oninput="mpcCalc()" onblur="mpcClampL('+id+')" style="'+IS+'">'
    +'</div>'
    +'<div style="margin-bottom:10px;">'
    +'<div style="font-size:12px;font-weight:600;color:#6c7a71;margin-bottom:5px;">จำนวน (ชิ้น)</div>'
    +'<input type="number" id="mpcQ'+id+'" min="1" step="1" value="1" oninput="mpcCalc()" style="'+IS+'">'
    +'</div>'
    +'<div style="padding-top:10px;border-top:1px dashed #dde7de;font-size:12px;color:#6c7a71;line-height:1.8;">'
    +'<div>ขนาดตัดจริง (เผื่อตัด 2 มม.): <b id="mpcSZ'+id+'" style="color:#233129;">—</b></div>'
    +'<div>พื้นที่รวม: <b id="mpcAR'+id+'" style="color:#233129;">—</b></div>'
    +'<div>ราคา/ตร.ม.: <b id="mpcRT'+id+'" style="color:#233129;">—</b></div>'
    +'<div>ราคารวม: <b id="mpcTT'+id+'" style="color:#1f5d4a;font-size:13px;">0.00 บาท</b></div>'
    +'</div>';
  items.appendChild(d);
  mpcCalc();
}

function mpcCalc(){
  var total=0,html='';
  for(var i=0;i<mpcIDS.length;i++){
    var id=mpcIDS[i];
    var mEl=document.getElementById('mpcM'+id);
    var wEl=document.getElementById('mpcW'+id);
    var lEl=document.getElementById('mpcL'+id);
    var qEl=document.getElementById('mpcQ'+id);
    if(!mEl||!wEl||!lEl||!qEl)continue;
    var m=mEl.value;
    var wR=parseFloat(wEl.value)||0;
    var lR=parseFloat(lEl.value)||0;
    var q=Math.max(1,parseInt(qEl.value)||1);
    wEl.style.borderColor=wR>mpcMW?'#c04438':'#dde7de';
    lEl.style.borderColor=lR>mpcML?'#c04438':'#dde7de';
    var w=Math.min(wR,mpcMW),l=Math.min(lR,mpcML);
    var cw=w>0?w+mpcBL:0,cl=l>0?l+mpcBL:0;
    var area=(cw/100)*(cl/100)*q;
    var rate=area>0?mpcRate(m,area):0;
    var line=area*rate;
    var szEl=document.getElementById('mpcSZ'+id);
    var arEl=document.getElementById('mpcAR'+id);
    var rtEl=document.getElementById('mpcRT'+id);
    var ttEl=document.getElementById('mpcTT'+id);
    if(szEl)szEl.textContent=cw>0?mpcFmt(cw)+' × '+mpcFmt(cl)+' ซม.':'—';
    if(arEl)arEl.textContent=area>0?mpcFmt(area)+' ตร.ม.':'—';
    if(rtEl)rtEl.textContent=rate>0?mpcFmt(rate)+' บาท':'—';
    if(ttEl)ttEl.textContent=mpcFmt(line)+' บาท';
    total+=line;
    html+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f4f1;font-size:13px;color:#6c7a71;font-family:Sarabun,Arial,sans-serif;">'
         +'<span>สติกเกอร์ '+m+'</span>'
         +'<span style="font-weight:600;color:#233129;">'+mpcFmt(line)+' บาท</span></div>';
  }
  var sl=document.getElementById('mpcSumList');
  var tl=document.getElementById('mpcTotal');
  if(sl)sl.innerHTML=mpcIDS.length?html:'<div style="font-size:13px;color:#9aa69d;padding:4px 0;">ยังไม่มีรายการ</div>';
  if(tl)tl.textContent=mpcFmt(total)+' บาท';
}

/* รอ DOM พร้อมก่อนแล้วค่อย init */
function mpcInit(){
  if(document.getElementById('mpcItems')){
    mpcAdd();
  } else {
    setTimeout(mpcInit, 100);
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', mpcInit);
} else {
  setTimeout(mpcInit, 0);
}
</script>
<!-- ==================== END ==================== -->
